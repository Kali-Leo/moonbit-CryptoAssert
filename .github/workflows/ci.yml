name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MOON_HOME: /home/runner/.moon

jobs:
  check:
    name: moon check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MoonBit
        run: |
          export MOON_HOME="/home/runner/.moon"
          mkdir -p "$MOON_HOME/bin"
          curl -sSfLo /tmp/install-moon.sh https://cli.moonbitlang.com/install/linux_amd64.sh
          yes '' | bash /tmp/install-moon.sh
          ls -la "$MOON_HOME/bin/"
          echo "$MOON_HOME/bin" >> "$GITHUB_PATH"

      - name: moon check
        run: moon check

  prove:
    name: moon prove (formal verification)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MoonBit
        run: |
          export MOON_HOME="/home/runner/.moon"
          mkdir -p "$MOON_HOME/bin"
          curl -sSfLo /tmp/install-moon.sh https://cli.moonbitlang.com/install/linux_amd64.sh
          yes '' | bash /tmp/install-moon.sh
          echo "$MOON_HOME/bin" >> "$GITHUB_PATH"

      - name: Install Why3 / Z3
        run: |
          sudo apt-get update -y
          sudo apt-get install -y why3

      - name: Detect Why3 provers
        run: why3 config detect

      - name: moon prove
        run: moon prove

  test:
    name: moon test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MoonBit
        run: |
          export MOON_HOME="/home/runner/.moon"
          mkdir -p "$MOON_HOME/bin"
          curl -sSfLo /tmp/install-moon.sh https://cli.moonbitlang.com/install/linux_amd64.sh
          yes '' | bash /tmp/install-moon.sh
          echo "$MOON_HOME/bin" >> "$GITHUB_PATH"

      - name: moon test
        run: moon test -v --target native